# base font size pts
font_size 14.0
# never hide mouse cursor
mouse_hide_wait -1.0
# start window maximized
os_window_state maximized
# minimal chrome, rounded corners (macOS)
hide_window_decorations titlebar-and-corners
# skip close confirmation dialog
confirm_os_window_close 0
# slight window transparency
background_opacity 0.9
# blur behind transparent bg (macOS)
background_blur 64
# use fish as shell
shell /opt/homebrew/bin/fish
# option key acts as alt
macos_option_as_alt yes
# toggle fullscreen shortcut
map ctrl+shift+f toggle_maximized
# reload config shortcut
map ctrl+cmd+,   load_config_file
# load external color theme
include current-theme.conf
# primary nerd font
font_family      family="MesloLGM Nerd Font Mono"
# auto-detect font variants
bold_font        auto
italic_font      auto
bold_italic_font auto
